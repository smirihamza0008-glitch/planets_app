plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    // هذا البلجن هو المسؤول عن ربط مكتبات فلاتر برمجياً
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // التأكد من مطابقة الـ Namespace لاسم مشروعك
    namespace "com.example.planets_explorer"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        // معرف التطبيق الفريد الخاص بك
        applicationId "com.example.planets_explorer"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            // إعدادات النسخة النهائية وتوقيع التطبيق
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    // دعم لغة كوتلن وتوافقها مع نظام أندرويد
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.core:core-ktx:1.12.0"
}
