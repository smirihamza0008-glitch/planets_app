plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.planets_explorer"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.planets_explorer"
        // يفضل استخدام 21 لضمان عمل التطبيق على الهواتف القديمة
        minSdk 21
        targetSdk 34
        // هذه الأسطر تجعل التطبيق يقرأ الإصدار من ملف pubspec.yaml تلقائياً
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // في المرحلة الحالية، نستخدم debug للتجربة، لاحقاً سنحتاج لـ Keystore
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
}
