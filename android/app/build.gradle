plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.planets_explorer"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.planets_explorer"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    // هذا السطر هو الحل النهائي لربط فلاتر بكوتلن
    implementation "io.flutter:flutter_embedding_debug:1.0.0-e672b006451c51519958bbdc0682c332c86ba2c8"
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
}
