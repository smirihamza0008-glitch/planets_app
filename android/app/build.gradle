plugins {
    id "com.android.application"
    id "kotlin-android"
    // أضفنا رقم الإصدار هنا لحل مشكلة 'was not found' الأخيرة
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0"
}

android {
    namespace "com.example.planets_explorer"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.planets_explorer"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
}
