plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // تعريف المسار البرمجي الموحد
    namespace "com.example.planets_explorer"
    compileSdk 35

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.planets_explorer"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0"
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    // حل مشكلة 'kotlin_version' بوضع الإصدار مباشرة
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
    
    // حل مشكلة Unresolved reference بإضافة المكتبات الناقصة
    implementation "androidx.annotation:annotation:1.7.1"
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.3'
}
