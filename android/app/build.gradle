plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.planets_explorer"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

        defaultConfig {
        applicationId "com.example.planets_explorer"
        minSdk 21
        targetSdk 34
        // وضعنا الأرقام يدوياً هنا لحل المشكلة فوراً
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            // في المرحلة الحالية، نستخدم debug للتجربة، لاحقاً سنحتاج لـ Keystore
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    implementation platform('org.jetbrains.kotlin:kotlin-bom:1.9.22')
    implementation 'org.jetbrains.kotlin:kotlin-stdlib'
}
