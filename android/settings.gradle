pluginManagement {
    def flutterSdkPath = {
        def sdkPath = System.getenv("FLUTTER_SDK_PATH") ?: System.getenv("FLUTTER_ROOT")
        
        // إذا لم يجد المسار في المتغيرات، نضعه يدوياً للسيرفر
        if (sdkPath == null) {
            sdkPath = "/Users/builder/programs/flutter"
        }
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.2.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"
